project: Vex
description: |
  Spec-driven test coverage auditor that verifies tests fully cover
  intended behavior described in a spec. Designed for AI agent consumption.

shared:
  - name: exit-codes
    description: |
      Exit 0 on success or no gaps found. Exit 1 when gaps or suggestions
      are found. Exit 2 on fatal error (file not found, invalid config, etc).
  - name: error-output
    description: |
      Errors and diagnostics go to stderr. JSON output goes to stdout.
      Progress messages (file paths written, warnings) go to stderr.
  - name: json-output
    description: |
      Commands that produce reports write indented JSON to stdout and
      also write the same JSON to a file in .vex/ directory.

sections:
  - name: Config
    path: internal/config
    description: |
      Configuration loading from vex.yaml and default generation.
    behaviors:
      - name: config-defaults
        description: |
          Default config uses provider "claude-cli", model "opus",
          max_concurrency 5. No api_key_env or language overrides.
          max_concurrency controls how many LLM calls run in parallel
          during vex check when processing multiple sections.
      - name: config-load
        description: |
          Loads vex.yaml from explicit path. If path is empty, walks up
          the directory tree from cwd to filesystem root looking for
          vex.yaml. Returns error if not found during walk.
      - name: config-load-partial
        description: |
          When loaded config omits fields (provider, model, max_concurrency),
          missing fields are filled with defaults. Explicitly set fields
          are preserved.
      - name: config-language-overrides
        description: |
          Config languages map overrides built-in detection. Each language
          entry has test_patterns and source_patterns as glob lists.
      - name: config-write-default
        description: |
          WriteDefault creates a vex.yaml with default values. Returns
          error if file already exists (no overwrite).

  - name: CLI Root
    file: [internal/cli/root.go, internal/cli/init.go, internal/cli/init_test.go, internal/cli/output.go, internal/cli/output_test.go]
    description: |
      Root command setup, config loading, init command, and shared output.
    shared: [exit-codes, error-output, json-output]
    behaviors:
      - name: root-config-loading
        description: |
          Root command loads config via PersistentPreRunE. Skips config
          loading for init, guide, drift, and update commands. Falls back
          to defaults if config file not found (no error). Sets global cfg.
      - name: root-config-flag
        description: |
          --config flag specifies explicit path to vex.yaml.
      - name: init-command
        description: |
          vex init creates default vex.yaml via config.WriteDefault.
          Prints "Created vex.yaml" to stderr on success. Returns
          error if file already exists.
      - name: write-output
        description: |
          Creates .vex/ directory (0755) if missing. Writes data
          to .vex/{filename} with trailing newline. Prints written
          path to stderr. Returns error on directory creation or
          write failure.

  - name: CLI Check
    file: [internal/cli/check.go, internal/cli/check_test.go]
    description: |
      Check command: loads spec, gathers files, runs check engine.
    shared: [exit-codes, error-output, json-output]
    behaviors:
      - name: check-spec-loading
        description: |
          Loads spec from --spec flag (default .vex/vexspec.yaml).
          Returns error if spec file not found or invalid.
      - name: check-section-filter
        description: |
          --section flag filters to a single named section.
          Returns error if named section not found in spec.
          Case-sensitive match.
      - name: check-covered-overrides
        description: |
          Filters out behaviors listed in a section's covered: entries
          before sending to the LLM. Injects them directly into the
          report as covered entries with the reason as the detail field.
          Covered overrides count toward total_behaviors in the summary.
          Logs each override to stderr.
      - name: check-file-gathering
        description: |
          For each section, detects language and finds source/test
          files from section paths. Warns on stderr if language
          detection or file finding fails for a path but continues.
          Warns if no files found for a section.
      - name: check-execution
        description: |
          Calls check.RunProject with gathered files and provider.
          On check error, prints to stderr but still outputs
          whatever report was generated.
      - name: check-profile-mode
        description: |
          When --profile flag is passed, creates a perf.Profile that
          instruments all phases: spec loading, drift detection, file
          discovery, file reading, and LLM calls. After check completes,
          prints human-readable timing summary to stderr and writes
          machine-readable JSON to .vex/profile.json.
      - name: check-drift-mode
        description: |
          Drift detection is on by default (--drift=true). Skips
          sections where neither code files nor spec content have
          changed since the last check. Compares per-section spec
          checksums stored in report.json against current checksums
          to detect spec-only edits. Falls back to file-only drift
          when no stored checksums exist. If no previous check exists,
          checks all sections with a warning. If all sections are
          clean, outputs empty report. Sections where drift check
          fails are included as a safety fallback. Use --drift=false
          to force a full re-check.
      - name: check-output
        description: |
          Writes JSON report to stdout and .vex/report.json.
          Report includes per-section spec checksums for drift
          detection. Exit code 0 if no gaps, exit code 1 if
          gaps found.

  - name: CLI Validate
    file: [internal/cli/validate.go]
    description: |
      Validate command: checks spec completeness via LLM.
    shared: [exit-codes, error-output, json-output]
    behaviors:
      - name: validate-spec-arg
        description: |
          Accepts optional positional arg for spec file path.
          Defaults to .vex/vexspec.yaml if no arg provided.
      - name: validate-execution
        description: |
          Sends the loaded spec to the LLM to check for missing
          behaviors. Returns suggestions for gaps and flags
          non-behavioral entries for removal.
      - name: validate-output
        description: |
          Writes JSON validation result to stdout and
          .vex/validation.json. Exit code 1 if not complete,
          exit code 0 if complete.

  - name: CLI Spec
    file: [internal/cli/spec.go, internal/cli/spec_test.go]
    description: |
      Spec command: generates and extends vexspec sections via LLM.
    shared: [exit-codes, error-output]
    behaviors:
      - name: spec-generate-new
        description: |
          vex spec "description" generates new sections. Requires
          exactly one positional argument; errors if no description
          provided. If no existing spec, creates .vex/vexspec.yaml
          with inferred project name (directory basename, fallback
          "MyProject"). Prints created section names to stderr.
      - name: spec-generate-append
        description: |
          If .vex/vexspec.yaml exists, appends generated sections
          to existing spec without overwriting existing sections.
      - name: spec-extend
        description: |
          --extend flag adds behaviors/subsections to an existing
          named section. Returns error if section not found.
          Case-sensitive match. Prints count of added behaviors
          to stderr.

  - name: CLI Guide
    file: [internal/cli/guide.go, internal/cli/guide_test.go]
    description: |
      Guide command: prints agent-facing instructions.
    behaviors:
      - name: guide-content
        description: |
          Prints agent-facing instructions for writing vexspecs.
          Includes spec format examples, behavior description
          guidelines, output file locations (.vex/report.json,
          .vex/validation.json), example workflow, and command
          reference.
      - name: guide-formula-guidance
        description: |
          Guide includes a "Formulas and Equations" section that
          instructs agents to include formulas directly in behavior
          descriptions. Provides examples (GBM, Black-Scholes)
          showing how to write formula-bearing behaviors with the
          formula itself and expected test verification criteria.
      - name: guide-covered-overrides
        description: |
          Guide includes a "Covered Overrides" section explaining how
          to mark behaviors as covered without LLM analysis. Documents
          the covered: field with behavior and reason, use cases
          (e2e binary spawns, FFI, IPC), and that both fields are required.
      - name: guide-section-sizing
        description: |
          Guide includes a "Section Sizing" section advising to keep
          sections under 10 behaviors. Explains that sections are both
          the concurrency boundary (parallel LLM calls) and the drift
          boundary (skip unchanged sections). Recommends splitting into
          independent sections over adding subsections for better
          parallelism and finer drift granularity. Subsections are for
          behaviors that share code paths and must be evaluated together.
      - name: guide-workflow
        description: |
          Guide workflow is structured into three phases: first-time
          spec authoring (spec, validate, fix loop), implementation
          loop (check, fix gaps, repeat), and ongoing development
          (validate regularly, then check). Drift detection is on by
          default. Notes --drift=false for forcing full re-checks.

  - name: CLI Update
    file: [internal/cli/update.go, internal/cli/update_test.go]
    description: |
      Update command: self-update via GitHub releases or go install.
    behaviors:
      - name: update-version-check
        description: |
          Fetches latest release tag from GitHub API. If current
          version matches latest, logs "already up to date" and
          returns without error.
      - name: update-via-go
        description: |
          When the binary was installed via go install (no ldflags),
          runs go install github.com/nickw409/vex/cmd/vex@{tag}
          to update through the Go toolchain.
      - name: update-via-binary
        description: |
          When the binary was built with ldflags (prebuilt release),
          downloads the correct tarball for the current OS/arch from
          GitHub Releases, extracts the vex binary from the tar.gz,
          and atomically replaces the running binary via temp file
          and rename.

  - name: Spec Data Model
    file: internal/spec/spec.go
    description: |
      Spec data structures, YAML loading, validation, and path helpers.
    behaviors:
      - name: spec-load-project
        description: |
          Loads ProjectSpec from YAML file. Default path is
          .vex/vexspec.yaml. Returns error on file not found,
          invalid YAML, or validation failure.
      - name: spec-validation
        description: |
          Validates project name is set, at least one section exists,
          shared behaviors have name+description with no duplicates,
          section shared refs point to existing shared behaviors,
          section behaviors have name+description, subsections have
          name and can't have both path and file set. Covered overrides
          must have both behavior and reason fields.
      - name: spec-covered-overrides
        description: |
          Sections can declare covered: entries with behavior and reason
          fields. These mark behaviors as covered without LLM analysis.
          CoveredOverride is parsed from YAML and included in section
          checksums for drift detection.
      - name: spec-path-list
        description: |
          PathList unmarshals both string and array YAML into a
          string slice. Single path "foo" becomes ["foo"], list
          ["foo","bar"] stays as-is.
      - name: spec-all-behaviors
        description: |
          AllBehaviors collects shared (resolved by name), section,
          and subsection behaviors into one list for a section.
          ResolveShared returns only the shared behaviors referenced
          by a section.
      - name: spec-section-paths
        description: |
          SectionPaths returns deduplicated list of all paths for
          a section: section paths, subsection paths, and parent
          directories of subsection files.
      - name: spec-section-checksum
        description: |
          SectionChecksum returns a SHA-256 hex digest of a section's
          spec content: name, description, shared refs and their resolved
          behaviors, section behaviors, and subsection names and behaviors.
          Used by drift detection to identify spec-only changes.

  - name: Spec Validation
    file: internal/spec/validate.go
    description: |
      LLM-based spec completeness validation.
    behaviors:
      - name: validate-project
        description: |
          Sends entire spec to LLM to find missing behaviors.
          Returns ValidationResult with complete bool and
          suggestions array. Each suggestion has section name,
          behavior_name, description, and relation (new or
          extends existing). Only suggests conspicuously absent
          behaviors within each section's scope.
      - name: validate-formula-tolerance
        description: |
          Validation prompt explicitly states that mathematical
          formulas and equations are valid behaviors defining a
          correctness contract. The LLM must not flag formula-
          bearing behaviors as non-behavioral entries for removal.

  - name: Spec Generation
    file: internal/spec/generate.go
    description: |
      LLM-based spec section and behavior generation.
    behaviors:
      - name: generate-sections
        description: |
          Takes task description, calls LLM, returns list of
          sections with behaviors and subsections. Validates
          all sections have names and all behaviors have
          name+description. Returns error if LLM response
          is not valid YAML or fails validation.
      - name: generate-extend
        description: |
          Takes task description and existing section, calls LLM
          to generate only new behaviors/subsections that don't
          duplicate existing ones. Returns ExtendResult.
      - name: generate-formula-support
        description: |
          Both generate and extend prompts accept mathematical
          formulas and equations as valid behaviors. When a task
          involves a formula or numerical method, the LLM is
          instructed to include the formula directly in the
          behavior description so test coverage can be verified
          against the mathematical definition.

  - name: Provider
    path: internal/provider
    description: |
      LLM provider abstraction and implementations.
    subsections:
      - name: Factory
        file: internal/provider/provider.go
        behaviors:
          - name: provider-factory
            description: |
              New() creates provider from config. Currently only
              supports "claude-cli". Returns error on unknown provider.
          - name: provider-retryable-errors
            description: |
              IsRetryable classifies errors as transient (rate limit or
              overload) vs permanent. Matches on "rate_limit", "rate limit",
              "overloaded", "429", and "529" in the error message. Returns
              false for nil errors and permanent failures (parse errors,
              not-found, auth).

      - name: Claude CLI
        file: internal/provider/claude_cli.go
        behaviors:
          - name: claude-cli-execution
            description: |
              Runs claude --print --output-format json --model {model}
              --system-prompt {system}. Passes user prompt via stdin.
              Parses JSON response with result, total_cost_usd,
              duration_ms, and usage fields.
          - name: claude-cli-not-found
            description: |
              If claude binary not found, returns error with install
              instructions URL.
          - name: claude-cli-usage-logging
            description: |
              Logs to stderr: input tokens, output tokens, cost
              (USD), and duration. Format: [vex] tokens: {n} in
              / {n} out | cost: ${n} | time: {n}s

  - name: Check Engine
    path: internal/check
    description: |
      Core gap detection engine using LLM to audit test coverage.
    behaviors:
      - name: check-run-project
        description: |
          RunProject runs LLM calls for each section using a pipelined
          task queue with adaptive concurrency, bounded by max_concurrency
          from config (default 5). Merges results into single report with
          computed summary. If max_concurrency is <= 0, defaults to 5.
          Accepts optional perf.Profile for timing instrumentation.
      - name: check-two-pass
        description: |
          Uses a two-pass strategy to minimize cost. First pass sends
          only test files and behavior descriptions — LLM maps tests
          to behaviors and identifies which behaviors have no obvious
          test coverage. Second pass sends source and test files only
          for behaviors flagged as uncovered in the first pass. If all
          behaviors are covered in the first pass, the second pass is
          skipped entirely. Well-tested codebases converge to first-
          pass-only cost over successive runs.
      - name: check-pipelining
        description: |
          Pass 1 results flow directly into pass 2 as each section
          completes, rather than waiting for all of pass 1 to finish.
          When a section's pass 1 finds uncovered behaviors, its pass 2
          task is immediately enqueued and can begin as soon as a
          concurrency slot opens. This reduces wall-clock time when
          sections have different prompt sizes.
      - name: check-adaptive-concurrency
        description: |
          On retryable errors (rate limits, overload), reduces concurrency
          by 1 (floor 1) and requeues the failed section for retry (max 2
          retries per section). On each successful LLM call, increases
          concurrency by 1 (capped at max_concurrency). This self-tunes
          throughput based on actual provider pressure from competing agents.
      - name: check-retry
        description: |
          Failed LLM calls are classified via provider.IsRetryable. Retryable
          errors are requeued up to 2 times. Permanent errors (parse failure,
          auth, not-found) fail immediately with no retry. If retries are
          exhausted, the section is reported as an error in the final report.
      - name: check-unspecified-detection
        description: |
          When source code contains significant observable behavior
          not described in the spec (e.g. concurrency, rate limiting,
          caching), flags it as a gap with behavior name "UNSPECIFIED"
          and describes the missing spec coverage. Keeps the spec
          in sync with the code without requiring manual review.
          Only runs during the second pass since it requires source
          code to detect.
      - name: check-false-positive-filter
        description: |
          Post-processes UNSPECIFIED gaps by checking if the detail
          references any known behavior, section, or subsection name
          from the full spec. Removes false positives caused by per-
          section LLM calls not seeing the full spec.
      - name: check-section-prompt
        description: |
          Builds prompt from section name, description, behaviors,
          and files. Enforces 400K char limit on total content.
          Returns error if exceeded, suggesting --diff or narrower
          path.
      - name: check-formula-awareness
        description: |
          When a behavior description contains a mathematical formula,
          equation, or numerical method, both pass 1 and pass 2 prompts
          instruct the LLM to verify that tests assert mathematical
          correctness — known inputs with expected outputs, boundary
          conditions, or convergence/statistical properties. A formula-
          bearing behavior is only marked covered when tests would catch
          an incorrect implementation of that formula, not merely when
          the function is called or runs without error.
      - name: check-response-parsing
        description: |
          Parses LLM JSON response, extracting JSON even when the
          LLM includes preamble text or markdown fences. Returns
          empty slices (not nil) for gaps and covered if LLM
          returns none. Each gap has behavior, detail, suggestion.
          Each covered has behavior, detail, test_file, test_name.

  - name: Performance Profiling
    path: internal/perf
    description: |
      Lightweight timing instrumentation for profiling vex check phases.
    behaviors:
      - name: perf-profile
        description: |
          Profile collects timing spans concurrently. Start begins a named
          span with an optional parent (e.g. section name) and returns a
          stop function. Duration is recorded in milliseconds. Safe for
          concurrent use from multiple goroutines.
      - name: perf-output
        description: |
          Print writes a human-readable summary to stderr grouped by parent.
          WriteFile writes all spans as indented JSON to the given path.
          Spans returns a copy of all collected spans.

  - name: Report
    path: internal/report
    description: |
      Test coverage report formatting.
    behaviors:
      - name: report-json
        description: |
          JSON() marshals report to indented JSON (2-space indent).
      - name: report-has-gaps
        description: |
          HasGaps returns true if gaps array is non-empty.
      - name: report-compute-summary
        description: |
          ComputeSummary counts fully covered (behaviors in covered
          but not in gaps) and total gap count.
      - name: report-section-checksums
        description: |
          Report includes optional SectionChecksums field (map of
          section name to SHA-256 hex string). Omitted from JSON
          when empty. Populated by the check command for drift
          detection of spec-only changes.

  - name: Language Detection
    path: internal/lang
    description: |
      Language detection and test/source file discovery.
    behaviors:
      - name: lang-detect
        description: |
          Detect returns the single most common language by file count.
          DetectAll returns all detected languages sorted by file count.
          Built-in set: Go, TypeScript, JavaScript, Python, Java, Rust,
          C, C++, C#, Ruby, Kotlin, Swift, PHP, CUDA. JavaScript files
          are only counted if package.json exists. Skips node_modules,
          vendor, .git directories. Config overrides replace builtins
          with the same name. Returns error if no language detected.
      - name: lang-find-files
        description: |
          FindFiles walks a directory for a single language. FindFilesMulti
          walks once for multiple languages, classifying each file as
          source or test across all language patterns. Test classification
          takes priority. Deduplicates files. Skips node_modules, vendor,
          .git directories.
      - name: lang-is-test-file
        description: |
          IsTestFile checks a filename against one language's test patterns.
          IsTestFileMulti checks against all languages' test patterns.

  - name: Drift
    path: [internal/diff, internal/cli]
    description: |
      Detects code changes since the last vex check to identify
      sections that may need re-checking.
    subsections:
      - name: Drift Detection
        file: internal/diff/drift.go
        behaviors:
          - name: drift-detection
            description: |
              Compares git log since a timestamp against section paths
              and also checks for uncommitted changes (staged and
              unstaged) via git diff HEAD. Returns list of changed
              files per section, or nil if no changes. Deduplicates
              file paths across multiple paths.
          - name: report-mod-time
            description: |
              Returns the modification time of .vex/report.json as the
              last check timestamp. Returns zero time if file missing.
          - name: report-checksums
            description: |
              Reads section_checksums from .vex/report.json. Returns
              a map of section name to SHA-256 hex digest. Returns nil
              if file missing, unreadable, or has no checksums field.

      - name: Drift Command
        file: internal/cli/drift.go
        behaviors:
          - name: drift-command
            description: |
              vex drift loads spec, checks each section for git changes
              since last check. Outputs JSON with drifted sections and
              changed files, plus clean sections. Exit 1 if any sections
              drifted, exit 0 if all clean, exit 2 if no previous check.

  - name: Diff
    path: internal/diff
    description: |
      Git diff integration for scoping checks to changed files.
    behaviors:
      - name: diff-changed-files
        description: |
          Runs git diff HEAD --name-only in directory. Returns
          absolute paths. Returns nil if no changes. Returns
          error if directory is not inside a git repository.
      - name: diff-filter-by-language
        description: |
          Separates file list into source and test files by matching
          against language glob patterns. Accepts multiple languages
          and checks patterns across all of them.
